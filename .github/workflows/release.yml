name: '[Manual|PR] Release'
on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug'
        type: boolean
        default: true
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true
  pull_request:
    branches:
      - main
      - beta
      - develop
      - next-version
    paths:
      - '__mocks__/**'
      - '__tests__/**'
      - 'src/**'
      - 'package*'
      - 'ts*'
      - '!www/**'
  push:
    branches:
      - main
      - beta
      - develop
      - next-version
    paths:
      - '__mocks__/**'
      - '__tests__/**'
      - 'src/**'
      - 'package*'
      - 'ts*'
      - '!www/**'

# Cancel redundant in-progress runs for the same ref (replaces the
# `cancel_others` behaviour of the now-unmaintained skip-duplicate-actions).
# Scoped to pull_request only: a push to a release branch is never cancelled,
# so an in-flight publish can never be interrupted by a newer push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests-dev:
    name: Run test on ${{ matrix.name }}
    if: |
      github.event_name != 'workflow_dispatch'
      && contains(fromJSON('["beta","develop","next-version"]'), github.base_ref || github.ref_name)
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rpc-devnet
            TEST_NODE_URL: http://127.0.0.1:5050/rpc

    uses: ./.github/workflows/_test.yml
    with:
      use-devnet: ${{ matrix.TEST_NODE_URL != '' }}
    secrets:
      TEST_NODE_URL: ${{ matrix.TEST_NODE_URL }}

  tests-main:
    name: Run test on ${{ matrix.node }} ${{ matrix.protocol }} ${{ matrix.version }}
    if: |
      github.event_name != 'workflow_dispatch'
      && (github.base_ref || github.ref_name) == 'main'
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        protocol: [RPC, WS]
        node: [Juno, Pathfinder]
        version: [v0_9, v0_10]

    uses: ./.github/workflows/_test.yml
    with:
      protocol: ${{ matrix.protocol }}
      node: ${{ matrix.node }}
      version: ${{ matrix.version }}
    secrets: inherit

  release-auto:
    name: Release
    needs: [tests-dev, tests-main]
    # `always() && !failure()` lets the release proceed even when a test job is
    # skipped (e.g. tests-main is skipped on non-`main` branches), while still
    # blocking it if a test job actually fails. semantic-release is idempotent
    # (no version bump = no publish), so running it on a duplicate push is safe.
    if: |
      always()
      && !failure()
      && github.event_name == 'push'
    uses: ./.github/workflows/_release.yml
    secrets: inherit
    permissions:
      packages: write
      pull-requests: write
      contents: write
      issues: write
      id-token: write

  release-manual:
    name: Release (manual)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_release.yml
    with:
      debug: ${{ inputs.debug }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
    permissions:
      packages: write
      pull-requests: write
      contents: write
      issues: write
      id-token: write
